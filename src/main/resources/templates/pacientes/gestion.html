<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/base :: cabecera_comun}"></head>
<body>
    <nav th:replace="~{fragmentos/base :: botonera}"></nav>

    <main class="content-area">
        <header class="mb-4 border-bottom pb-3">
            <h2 class="text-secondary"><i class="bi bi-people-fill me-2"></i>Gestión de Pacientes</h2>
        </header>

        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 text-primary" th:text="${paciente.id != null} ? 'Editar Paciente' : 'Nuevo Paciente'"></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/pacientes/guardar}" th:object="${paciente}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-2">
                                <label class="form-label small fw-bold">DNI</label>
                                <input type="text" th:field="*{dni}" class="form-control form-control-sm" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Nombre</label>
                                    <input type="text" th:field="*{nombre}" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Apellido</label>
                                    <input type="text" th:field="*{apellido}" class="form-control form-control-sm" required>
                                </div>
                            </div>

                            <div class="mb-2">
                                <label class="form-label small fw-bold">Email</label>
                                <input type="email" th:field="*{email}" class="form-control form-control-sm">
                            </div>

                            <div class="row">
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Usuario</label>
                                    <input type="text" th:field="*{usuario}" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-6 mb-2">
                                    <label class="form-label small fw-bold">Password</label>
                                    <input type="password" th:field="*{password}" class="form-control form-control-sm" th:required="${paciente.id == null}">
                                </div>
                            </div>

                            <div class="row border-top pt-2 mt-2">
                                <div class="col-12 mb-2">
                                    <label class="form-label small fw-bold text-success">Obra Social</label>
                                    <input type="text" th:field="*{obraSocial}" class="form-control form-control-sm" placeholder="Ej: OSDE, PAMI...">
                                </div>
                                <div class="col-7 mb-2">
                                    <label class="form-label small fw-bold text-success">Nro. Afiliado</label>
                                    <input type="text" th:field="*{nroAfiliado}" class="form-control form-control-sm">
                                </div>
                                <div class="col-5 mb-2">
                                    <label class="form-label small fw-bold text-success">G. Sanguíneo</label>
                                    <select th:field="*{grupoSanguineo}" class="form-select form-select-sm">
                                        <option value="">Seleccionar</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="0+">0+</option>
                                        <option value="0-">0-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-3">
                                <button type="submit" class="btn btn-primary shadow-sm">
                                    <i class="bi bi-save me-1"></i> Guardar Paciente
                                </button>
                                <a th:if="${paciente.id != null}" th:href="@{/pacientes/gestion}" class="btn btn-light btn-sm">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="px-4">DNI / Afiliado</th>
                                        <th>Paciente</th>
                                        <th>Obra Social</th>
                                        <th class="text-end px-4">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="p : ${listaPacientes}">
                                        <td class="px-4">
                                            <div class="fw-bold" th:text="${p.dni}"></div>
                                            <small class="text-muted" th:text="${p.nroAfiliado}"></small>
                                        </td>
                                        <td>
                                            <span th:text="${p.apellido + ', ' + p.nombre}"></span>
                                            <div class="small text-muted" th:text="${p.email}"></div>
                                        </td>
                                        <td>
                                            <span class="badge bg-light text-dark border" th:text="${p.obraSocial}"></span>
                                            <span class="badge bg-danger ms-1" th:if="${p.grupoSanguineo}" th:text="${p.grupoSanguineo}"></span>
                                        </td>
                                        <td class="text-end px-4">
                                            <a th:href="@{/pacientes/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-warning">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <a th:href="@{/pacientes/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar paciente?')">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(listaPacientes)}">
                                        <td colspan="4" class="text-center py-4 text-muted">No hay pacientes registrados.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
