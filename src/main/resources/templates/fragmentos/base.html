<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="cabecera_comun">
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; display: flex; }
        .sidebar { min-width: 250px; max-width: 250px; background: #2c3e50; color: white; min-height: 100vh; }
        .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .nav-link:hover { background: #34495e; color: #fff; }
        .sidebar .nav-link.active { background: #3498db; color: white; }
        .content-area { width: 100%; padding: 30px; }
        .logo-container { padding: 20px; background: #1a252f; text-align: center; }
    </style>
</head>

<body>
    <nav th:fragment="botonera" class="sidebar shadow">
        <div class="logo-container">
            <img th:src="@{/img/logo_medicar.png}" alt="MedicAR Logo" style="width: 80px;">
            <span class="fw-bold text-white">MedicAR</span>
        </div>
        <div class="nav flex-column mt-3">
            <a th:href="@{/}" class="nav-link"><i class="bi bi-house-door"></i> Inicio</a>
            <a th:href="@{/especialidades/gestion}" class="nav-link"><i class="bi bi-tags"></i> Especialidades</a>
            <a th:href="@{/profesionales/gestion}" class="nav-link"><i class="bi bi-person-badge"></i> Profesionales</a>
            <a th:href="@{/pacientes/gestion}" class="nav-link"><i class="bi bi-people"></i> Pacientes</a>
            <a th:href="@{/turnos/gestion}" class="nav-link"><i class="bi bi-calendar-event"></i> Turnos</a>
        </div>
    </nav>
</body>
</html>
