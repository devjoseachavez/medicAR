<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/base :: cabecera_comun}"></head>

<body>
    <nav th:replace="~{fragmentos/base :: botonera}"></nav>

    <main class="content-area">
        <header class="mb-4 border-bottom pb-3">
            <h2 class="text-secondary">Gestión de Especialidades</h2>
        </header>

        <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0" th:text="${especialidad.id != null} ? 'Editar Especialidad' : 'Nueva Especialidad'"></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/especialidades/guardar}" th:object="${especialidad}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Pediatría" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                                <i class="bi bi-save"></i> Guardar Especialidad
                            </button>
                            <a th:if="${especialidad.id != null}" th:href="@{/especialidades/gestion}" class="btn btn-light w-100 mt-2">Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="px-4">ID</th>
                                        <th>Nombre</th>
                                        <th class="text-end px-4">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="e : ${listaEspecialidades}">
                                        <td class="px-4" th:text="${e.id}"></td>
                                        <td class="fw-bold text-primary" th:text="${e.nombre}"></td>
                                        <td class="text-end px-4">
                                            <a th:href="@{/especialidades/editar/{id}(id=${e.id})}" class="btn btn-sm btn-outline-warning me-1">
                                                <i class="bi bi-pencil"></i>
                                            </a>
                                            <a th:href="@{/especialidades/eliminar/{id}(id=${e.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Estás seguro de eliminar esta especialidad?')">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(listaEspecialidades)}">
                                        <td colspan="3" class="text-center py-4 text-muted">No hay especialidades registradas.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
