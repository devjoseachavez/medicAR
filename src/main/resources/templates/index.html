<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/base :: cabecera_comun}"></head>
<body>
    <nav th:replace="~{fragmentos/base :: botonera}"></nav>

    <main class="content-area">
        <header class="mb-4">
            <h2 class="text-secondary">Panel de Control - MedicAR</h2>
            <p class="text-muted">
                Hoy es <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE dd')}"></span> 
                de <span th:text="${#temporals.format(#temporals.createNow(), 'MMMM')}"></span> 
                de <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span>
            </p>
        </header>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body d-flex align-items-center">
                        <div class="display-4 me-3"><i class="bi bi-people"></i></div>
                        <div>
                            <h6 class="mb-0">Pacientes</h6>
                            <h2 class="mb-0 fw-bold" th:text="${cantPacientes}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-success text-white">
                    <div class="card-body d-flex align-items-center">
                        <div class="display-4 me-3"><i class="bi bi-person-badge"></i></div>
                        <div>
                            <h6 class="mb-0">Profesionales</h6>
                            <h2 class="mb-0 fw-bold" th:text="${cantProfesionales}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-warning text-dark">
                    <div class="card-body d-flex align-items-center">
                        <div class="display-4 me-3"><i class="bi bi-calendar-event"></i></div>
                        <div>
                            <h6 class="mb-0">Turnos de Hoy</h6>
                            <h2 class="mb-0 fw-bold" th:text="${cantTurnosHoy}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Últimos Turnos Registrados</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="px-4">Fecha</th>
                                    <th>Paciente</th>
                                    <th>Médico</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t, iter : ${proximosTurnos}" th:if="${iter.index < 5}">
                                    <td class="px-4" th:text="${#temporals.format(t.fecha, 'dd/MM/yyyy')} + ' - ' + ${t.hora}"></td>
                                    <td th:text="${t.paciente.apellido + ' ' + t.paciente.nombre}"></td>
                                    <td th:text="${t.profesional.apellido}"></td>
                                    <td><span class="badge bg-success">Confirmado</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white text-center">
                        <a th:href="@{/turnos/gestion}" class="btn btn-sm btn-link">Ver toda la agenda</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
