<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/base :: cabecera_comun}"></head>
<body>
    <nav th:replace="~{fragmentos/base :: botonera}"></nav>

    <main class="content-area">
        <header class="mb-4 border-bottom pb-3">
            <h2 class="text-secondary">Gestión de Profesionales</h2>
        </header>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0" th:text="${profesional.id != null} ? 'Editar Médico' : 'Nuevo Médico'"></h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-ex-triangle-fill me-2"></i>
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
                        <form th:action="@{/profesionales/guardar}" th:object="${profesional}" method="post">
    <input type="hidden" th:field="*{id}">
    
    <div class="row">
        <div class="col-md-12 mb-2">
            <label class="form-label small fw-bold text-primary">DNI (Obligatorio)</label>
            <input type="text" th:field="*{dni}" class="form-control form-control-sm" placeholder="Sin puntos" required>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-2">
            <label class="form-label small fw-bold">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control form-control-sm" required>
        </div>
        <div class="col-md-6 mb-2">
            <label class="form-label small fw-bold">Apellido</label>
            <input type="text" th:field="*{apellido}" class="form-control form-control-sm" required>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-2">
            <label class="form-label small fw-bold text-primary">Usuario</label>
            <input type="text" th:field="*{usuario}" class="form-control form-control-sm" placeholder="user.med" required>
        </div>
        <div class="col-md-6 mb-2">
            <label class="form-label small fw-bold">Password</label>
            <input type="password" th:field="*{password}" class="form-control form-control-sm" placeholder="****" th:required="${profesional.id == null}">
            <small class="text-muted" style="font-size: 0.7rem;">Por defecto: 1234</small>
        </div>
    </div>

    <div class="row border-top pt-2 mt-2">
        <div class="col-md-6 mb-2">
            <label class="form-label small fw-bold">M. Provincial</label>
            <input type="text" th:field="*{matriculaProvincial}" class="form-control form-control-sm">
        </div>
        <div class="col-md-6 mb-2">
            <label class="form-label small fw-bold">M. Nacional</label>
            <input type="text" th:field="*{matriculaNacional}" class="form-control form-control-sm">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label small fw-bold text-success">Especialidades (Ctrl + clic)</label>
        <select th:field="*{especialidades}" class="form-select form-select-sm" multiple style="height: 100px;" required>
            <option th:each="e : ${todasLasEspecialidades}" 
                    th:value="${e.id}" 
                    th:text="${e.nombre}">
            </option>
        </select>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary shadow-sm">
            <i class="bi bi-check-circle"></i> Guardar Profesional
        </button>
        <a th:if="${profesional.id != null}" th:href="@{/profesionales/gestion}" class="btn btn-outline-secondary btn-sm">
            Cancelar Edición
        </a>
    </div>
</form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="px-4">Nombre Completo</th>
                                    <th>Matrículas</th>
                                    <th>Especialidades</th>
                                    <th class="text-end px-4">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${listaProfesionales}">
                                    <td class="px-4" th:text="${p.apellido + ', ' + p.nombre}"></td>
                                    <td class="small">
                                        <div th:text="'Prov: ' + ${p.matriculaProvincial}"></div>
                                        <div th:text="'Nac: ' + ${p.matriculaNacional}"></div>
                                    </td>
                                    <td>
                                        <span th:each="esp : ${p.especialidades}" 
                                              class="badge bg-info text-dark me-1" 
                                              th:text="${esp.nombre}"></span>
                                    </td>
                                    <td class="text-end px-4">
                                        <a th:href="@{/profesionales/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                                        <a th:href="@{/profesionales/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const alertExito = document.querySelector('[th\\:if="${exito}"]');
            const alertError = document.querySelector('[th\\:if="${error}"]');
            
            if (alertExito && alertExito.offsetParent !== null) {
                setTimeout(function() {
                    alertExito.style.display = 'none';
                }, 5000);
            }
            
            if (alertError && alertError.offsetParent !== null) {
                setTimeout(function() {
                    alertError.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
